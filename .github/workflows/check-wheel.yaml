name: Check Creation of Wheel Package
on: [pull_request]

# Least privilege: these jobs only read the checkout (back-ported from the
# devloop repo, review finding on its PR #11).
permissions:
  contents: read

jobs:
  python-wheel-check:
    strategy:
      matrix:
        path:
          - alissa-tools-github-revloop
    name: Wheel Package Check for ${{ matrix.path }}
    runs-on: ubuntu-latest
    steps:
      - name: Clone Repo
        uses: actions/checkout@v4
        with:
          submodules: true
      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install Requirements
        run: |
          python -m pip install --upgrade pip
          python -m pip install setuptools wheel
      - name: Create Wheel Package
        run: (cd ${{ matrix.path }}; python setup.py bdist_wheel)
      - name: Install Wheel Package
        run: python -m pip install ${{ matrix.path }}/dist/*.whl
      - name: Execute Simple Command to Verify Installation
        run: |
          python -c "from alissa.tools.github.revloop.version import version; assert version.value != '0.0.0', version; print(version)"
          alissa-revloop --help