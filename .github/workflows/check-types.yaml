name: Check Python Types
on: [pull_request]

# Least privilege: these jobs only read the checkout (back-ported from the
# devloop repo, review finding on its PR #11).
permissions:
  contents: read

jobs:
  python-types-check:
    strategy:
      matrix:
        path:
          - alissa-tools-github-reviewloop
    name: Python Types Check for ${{ matrix.path }}
    runs-on: ubuntu-latest
    steps:
      - name: Clone Repo
        uses: actions/checkout@v4
        with:
          submodules: true
      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install Requirements
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-develop.txt
      - name: Install Package
        run: python -m pip install -e ./${{ matrix.path }}
      - name: Execute Type Checks
        run: |
          bash check-types.sh ${{ matrix.path }}
